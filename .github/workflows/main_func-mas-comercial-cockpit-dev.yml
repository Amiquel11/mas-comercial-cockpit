name: Build and deploy Python project to Azure Function App - func-mas-comercial-cockpit-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'src/ingestion'
  PYTHON_VERSION: '3.11'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate python modules compile
        run: python -m py_compile ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/shared/sql_repository.py

      - name: Validate Azure Functions structure
        run: |
          test -f ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/host.json
          test -f ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/function_app.py

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production

    steps:
      - name: Resolve publish profile secret
        id: publish_profile
        run: |
          if [ -n "${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}" ]; then
            echo "value=${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}" ]; then
            echo "value=${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}" >> "$GITHUB_OUTPUT"
          else
            echo "Missing publish profile secret. Set AZURE_FUNCTIONAPP_PUBLISH_PROFILE (preferred) or AZUREAPPSERVICE_PUBLISHPROFILE." >&2
            exit 1
          fi

      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      - name: Deploy to Azure Functions (publish profile)
        uses: Azure/functions-action@v1
        with:
          app-name: 'func-mas-comercial-cockpit-dev'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ steps.publish_profile.outputs.value }}
