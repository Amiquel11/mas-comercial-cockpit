name: Build and deploy Python project to Azure Function App - func-mas-comercial-cockpit-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'src/ingestion'
  PYTHON_VERSION: '3.11'
  AZURE_FUNCTIONAPP_RESOURCE_GROUP: 'rg-mas-comercial-cockpit'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate python modules compile
        run: python -m py_compile ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/shared/sql_repository.py ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/health/__init__.py ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/pipedrive_ingestion_timer/__init__.py

      - name: Validate Azure Functions structure
        run: |
          test -f ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/host.json
          test -f ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/health/function.json
          test -f ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/pipedrive_ingestion_timer/function.json

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve authentication mode
        id: auth
        run: |
          if [ -n "${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}" ] || [ -n "${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}" ]; then
            echo "mode=publish_profile" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "mode=rbac" >> "$GITHUB_OUTPUT"
          else
            echo "No auth secret found. Configure one of: AZURE_FUNCTIONAPP_PUBLISH_PROFILE, AZUREAPPSERVICE_PUBLISHPROFILE, or AZURE_CREDENTIALS." >&2
            exit 1
          fi

      - name: Resolve publish profile secret
        id: publish_profile
        if: steps.auth.outputs.mode == 'publish_profile'
        run: |
          if [ -n "${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}" ]; then
            echo "value=${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Azure (service principal)
        if: steps.auth.outputs.mode == 'rbac'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions (publish profile)
        if: steps.auth.outputs.mode == 'publish_profile'
        uses: Azure/functions-action@v1
        with:
          app-name: 'func-mas-comercial-cockpit-dev'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ steps.publish_profile.outputs.value }}

      - name: Deploy to Azure Functions (RBAC)
        if: steps.auth.outputs.mode == 'rbac'
        uses: Azure/functions-action@v1
        with:
          app-name: 'func-mas-comercial-cockpit-dev'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}

      - name: Sync function triggers (RBAC)
        if: steps.auth.outputs.mode == 'rbac'
        run: az functionapp sync-functions --name func-mas-comercial-cockpit-dev --resource-group ${{ env.AZURE_FUNCTIONAPP_RESOURCE_GROUP }}

      - name: List discovered functions (RBAC)
        if: steps.auth.outputs.mode == 'rbac'
        run: az functionapp function list --name func-mas-comercial-cockpit-dev --resource-group ${{ env.AZURE_FUNCTIONAPP_RESOURCE_GROUP }} --query "[].name" -o tsv
